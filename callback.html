<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>登录中...</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3;
      display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f85149; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <div id="msg">正在登录，请稍候...</div>
  <div class="error" id="err"></div>
</div>
<script>
const OAUTH_API = 'https://community-green-chi.vercel.app/api/oauth'

async function handleCallback() {
  const code = new URLSearchParams(location.search).get('code')
  if (!code) { document.getElementById('err').textContent = '未获取到授权码'; return; }
  try {
    const res = await fetch(OAUTH_API + '?code=' + encodeURIComponent(code))
    const data = await res.json()
    if (!data.token) throw new Error(data.error || '获取token失败')
    localStorage.setItem('gh_token', data.token)
    const prev = sessionStorage.getItem('pre_login_page') || '/'
    sessionStorage.removeItem('pre_login_page')
    location.href = prev
  } catch (e) {
    document.getElementById('msg').textContent = '登录失败'
    document.getElementById('err').textContent = e.message
  }
}

handleCallback()
</script>
</body>
</html>
