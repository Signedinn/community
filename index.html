<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社区</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, "Microsoft YaHei", sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 18px; font-weight: 700; color: #58a6ff; cursor: pointer; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn { padding: 6px 16px; border-radius: 6px; border: 1px solid #30363d; cursor: pointer; font-size: 14px; font-family: inherit; transition: background 0.15s; }
    .btn-primary { background: #238636; border-color: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-ghost { background: transparent; color: #e6edf3; }
    .btn-ghost:hover { background: #21262d; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #30363d; }
    .username { font-size: 14px; font-weight: 600; color: #e6edf3; }
    main { max-width: 860px; margin: 32px auto; padding: 0 16px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-title { font-size: 20px; font-weight: 700; }
    .post-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .post-card:hover { border-color: #58a6ff; transform: translateY(-1px); }
    .post-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .post-card-avatar { width: 22px; height: 22px; border-radius: 50%; }
    .post-card-author { font-size: 13px; font-weight: 600; color: #58a6ff; }
    .post-card-time { font-size: 12px; color: #8b949e; margin-left: auto; }
    .post-card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .post-card-footer { display: flex; gap: 16px; font-size: 13px; color: #8b949e; }
    .post-detail { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
    .post-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .post-detail-meta { font-size: 13px; color: #8b949e; }
    .back-btn { margin-left: auto; font-size: 13px; color: #58a6ff; cursor: pointer; }
    .back-btn:hover { text-decoration: underline; }
    .post-detail-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; line-height: 1.4; }
    .post-detail-body { font-size: 15px; line-height: 1.8; color: #c9d1d9; white-space: pre-wrap; }
    .comments-section { margin-top: 24px; }
    .comments-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #8b949e; }
    .comment-item { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .comment-body { font-size: 14px; line-height: 1.7; color: #c9d1d9; white-space: pre-wrap; }
    .input-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
    .input-box h3 { font-size: 15px; margin-bottom: 12px; color: #8b949e; }
    .input-box input, .input-box textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #e6edf3; margin-bottom: 10px; resize: vertical; transition: border-color 0.15s; }
    .input-box input:focus, .input-box textarea:focus { outline: none; border-color: #58a6ff; }
    .tip { text-align: center; color: #8b949e; padding: 60px 0; font-size: 15px; }
    .login-tip { text-align: center; padding: 20px; color: #8b949e; font-size: 14px; background: #161b22; border: 1px dashed #30363d; border-radius: 8px; margin-bottom: 20px; }
    .login-tip span { color: #58a6ff; cursor: pointer; }
    .login-tip span:hover { text-decoration: underline; }
    .load-more-btn { display: block; width: 100%; margin-top: 8px; padding: 10px; text-align: center; }
    .empty { text-align: center; padding: 60px 0; color: #8b949e; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('home')">游戏社区</div>
  <div class="nav-right" id="nav-right">
    <button class="btn btn-primary" onclick="login()">GitHub 登录</button>
  </div>
</header>

<main>
  <div class="page active" id="page-home">
    <div class="page-header">
      <h1 class="page-title">最新帖子</h1>
      <button class="btn btn-primary" onclick="showNewPostForm()">发帖</button>
    </div>
    <div class="input-box" id="new-post-form" style="display:none">
      <h3>发新帖</h3>
      <input id="post-title-input" type="text" placeholder="帖子标题" maxlength="100" />
      <textarea id="post-body-input" placeholder="内容" rows="5"></textarea>
      <div style="display:flex; gap:8px">
        <button class="btn btn-primary" onclick="submitPost()">发布</button>
        <button class="btn btn-ghost" onclick="hideNewPostForm()">取消</button>
      </div>
    </div>
    <div id="posts-container"><div class="tip">NowLoading...少女祈祷中</div></div>
    <div id="load-more-area" style="display:none">
      <button class="btn btn-ghost load-more-btn" onclick="loadMorePosts()">加载更多</button>
    </div>
  </div>

  <div class="page" id="page-post">
    <div id="post-detail-container"></div>
    <div class="comments-section">
      <div id="comments-container"></div>
      <div id="reply-area"></div>
    </div>
  </div>
</main>

<script>
const CONFIG = {
  owner: 'Signedinn',
  repo: 'community',
  categoryId: 'DIC_kwDOR57re84C6EAz',
  clientId: 'Ov23lis3257U64xBIsgo',
}

let state = {
  token: localStorage.getItem('gh_token') || null,
  user: JSON.parse(localStorage.getItem('gh_user') || 'null'),
  posts: [],
  endCursor: null,
  hasNextPage: false,
}

async function gql(query, variables = {}) {
  const headers = { 'Content-Type': 'application/json' }
  if (state.token) headers['Authorization'] = 'bearer ' + state.token
  const res = await fetch('https://api.github.com/graphql', {
    method: 'POST', headers,
    body: JSON.stringify({ query, variables }),
  })
  const json = await res.json()
  if (json.errors) throw new Error(json.errors[0].message)
  return json.data
}

async function fetchPosts(after = null) {
  const data = await gql(`
    query($owner:String!,$repo:String!,$after:String){
      repository(owner:$owner,name:$repo){
        discussions(first:20,after:$after,orderBy:{field:CREATED_AT,direction:DESC}){
          pageInfo{hasNextPage endCursor}
          nodes{id number title createdAt upvoteCount
            author{login avatarUrl}
            comments{totalCount}}
        }
      }
    }
  `, { owner: CONFIG.owner, repo: CONFIG.repo, after })
  return data.repository.discussions
}

async function fetchPost(number) {
  const data = await gql(`
    query($owner:String!,$repo:String!,$number:Int!){
      repository(owner:$owner,name:$repo){
        discussion(number:$number){
          id number title body createdAt upvoteCount
          author{login avatarUrl}
          comments(first:50){
            nodes{id body createdAt upvoteCount author{login avatarUrl}}
          }
        }
      }
    }
  `, { owner: CONFIG.owner, repo: CONFIG.repo, number: parseInt(number) })
  return data.repository.discussion
}

let _repoId = null
async function getRepoId() {
  if (_repoId) return _repoId
  const data = await gql(`query($owner:String!,$repo:String!){repository(owner:$owner,name:$repo){id}}`,
    { owner: CONFIG.owner, repo: CONFIG.repo })
  _repoId = data.repository.id
  return _repoId
}

async function apiCreatePost(title, body) {
  const repoId = await getRepoId()
  const data = await gql(`
    mutation($repoId:ID!,$categoryId:ID!,$title:String!,$body:String!){
      createDiscussion(input:{repositoryId:$repoId,categoryId:$categoryId,title:$title,body:$body}){
        discussion{number title}
      }
    }
  `, { repoId, categoryId: CONFIG.categoryId, title, body })
  return data.createDiscussion.discussion
}

async function apiCreateComment(discussionId, body) {
  const data = await gql(`
    mutation($discussionId:ID!,$body:String!){
      addDiscussionComment(input:{discussionId:$discussionId,body:$body}){
        comment{id body createdAt author{login avatarUrl}}
      }
    }
  `, { discussionId, body })
  return data.addDiscussionComment.comment
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000
  if (diff < 60) return '刚刚'
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前'
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前'
  if (diff < 2592000) return Math.floor(diff / 86400) + ' 天前'
  return new Date(dateStr).toLocaleDateString('zh-CN')
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  window.scrollTo(0, 0)
}

function renderNav() {
  const el = document.getElementById('nav-right')
  if (state.user) {
    el.innerHTML = `<div class="user-info"><img class="avatar" src="${state.user.avatarUrl}" /><span class="username">${state.user.login}</span></div><button class="btn btn-ghost" onclick="logout()">退出</button>`
  } else {
    el.innerHTML = `<button class="btn btn-primary" onclick="login()">GitHub 登录</button>`
  }
}

function renderPostCard(post) {
  return `<div class="post-card" onclick="openPost(${post.number})">
    <div class="post-card-header">
      <img class="post-card-avatar" src="${post.author.avatarUrl}" />
      <span class="post-card-author">${post.author.login}</span>
      <span class="post-card-time">${timeAgo(post.createdAt)}</span>
    </div>
    <div class="post-card-title">${escapeHtml(post.title)}</div>
    <div class="post-card-footer"><span>💬 ${post.comments.totalCount} 评论</span><span>👍 ${post.upvoteCount}</span></div>
  </div>`
}

function renderPostDetail(post) {
  return `<div class="post-detail">
    <div class="post-detail-header">
      <img class="avatar" src="${post.author.avatarUrl}" />
      <div><div style="font-size:14px;font-weight:600;color:#58a6ff">${post.author.login}</div>
      <div class="post-detail-meta">${timeAgo(post.createdAt)} · 👍 ${post.upvoteCount}</div></div>
      <span class="back-btn" onclick="showPage('home')">← 返回列表</span>
    </div>
    <div class="post-detail-title">${escapeHtml(post.title)}</div>
    <div class="post-detail-body">${escapeHtml(post.body || '（暂无正文）')}</div>
  </div>`
}

function renderComment(comment) {
  return `<div class="comment-item">
    <div class="comment-header">
      <img class="avatar" style="width:22px;height:22px" src="${comment.author.avatarUrl}" />
      <span style="font-size:13px;font-weight:600;color:#58a6ff">${comment.author.login}</span>
      <span style="font-size:12px;color:#8b949e;margin-left:auto">${timeAgo(comment.createdAt)}</span>
    </div>
    <div class="comment-body">${escapeHtml(comment.body)}</div>
  </div>`
}

function renderReplyBox(discussionId) {
  if (!state.token) return `<div class="login-tip">登录后才能评论 &nbsp;<span onclick="login()">点击登录</span></div>`
  return `<div class="input-box"><h3>写评论</h3>
    <textarea id="comment-input" placeholder="说点什么..." rows="3"></textarea>
    <button class="btn btn-primary" onclick="submitComment('${discussionId}')">提交评论</button>
  </div>`
}

async function loadPosts() {
  document.getElementById('posts-container').innerHTML = '<div class="tip">加载中...</div>'
  try {
    const result = await fetchPosts()
    state.posts = result.nodes
    state.endCursor = result.pageInfo.endCursor
    state.hasNextPage = result.pageInfo.hasNextPage
    renderPostList()
  } catch (e) {
    document.getElementById('posts-container').innerHTML = '<div class="tip">加载失败：' + e.message + '</div>'
  }
}

async function loadMorePosts() {
  const result = await fetchPosts(state.endCursor)
  state.posts.push(...result.nodes)
  state.endCursor = result.pageInfo.endCursor
  state.hasNextPage = result.pageInfo.hasNextPage
  renderPostList()
}

function renderPostList() {
  const container = document.getElementById('posts-container')
  container.innerHTML = state.posts.length
    ? state.posts.map(renderPostCard).join('')
    : '<div class="empty"><div class="empty-icon">📭</div><div>还没有帖子，来发第一贴吧！</div></div>'
  document.getElementById('load-more-area').style.display = state.hasNextPage ? 'block' : 'none'
}

function showNewPostForm() {
  if (!state.token) { login(); return; }
  const form = document.getElementById('new-post-form')
  form.style.display = form.style.display === 'none' ? 'block' : 'none'
}

function hideNewPostForm() {
  document.getElementById('new-post-form').style.display = 'none'
  document.getElementById('post-title-input').value = ''
  document.getElementById('post-body-input').value = ''
}

async function submitPost() {
  const title = document.getElementById('post-title-input').value.trim()
  const body = document.getElementById('post-body-input').value.trim()
  if (!title) { alert('请填写标题'); return; }
  const btn = event.target
  btn.textContent = '发布中...'
  btn.disabled = true
  try {
    const post = await apiCreatePost(title, body)
    hideNewPostForm()
    await loadPosts()
    openPost(post.number)
  } catch (e) {
    alert('发布失败：' + e.message)
  } finally {
    btn.textContent = '发布'
    btn.disabled = false
  }
}

async function openPost(number) {
  showPage('post')
  document.getElementById('post-detail-container').innerHTML = '<div class="tip">加载中...</div>'
  document.getElementById('comments-container').innerHTML = ''
  document.getElementById('reply-area').innerHTML = ''
  try {
    const post = await fetchPost(number)
    document.getElementById('post-detail-container').innerHTML = renderPostDetail(post)
    const comments = post.comments.nodes
    document.getElementById('comments-container').innerHTML =
      '<div class="comments-title">评论 (' + comments.length + ')</div>' +
      comments.map(renderComment).join('')
    document.getElementById('reply-area').innerHTML = renderReplyBox(post.id)
  } catch (e) {
    document.getElementById('post-detail-container').innerHTML = '<div class="tip">加载失败：' + e.message + '</div>'
  }
}

async function submitComment(discussionId) {
  const input = document.getElementById('comment-input')
  const body = input.value.trim()
  if (!body) { alert('请输入评论内容'); return; }
  const btn = event.target
  btn.textContent = '提交中...'
  btn.disabled = true
  try {
    const comment = await apiCreateComment(discussionId, body)
    input.value = ''
    const container = document.getElementById('comments-container')
    container.innerHTML += renderComment(comment)
    const title = container.querySelector('.comments-title')
    if (title) {
      const match = title.textContent.match(/\d+/)
      if (match) title.textContent = '评论 (' + (parseInt(match[0]) + 1) + ')'
    }
  } catch (e) {
    alert('评论失败：' + e.message)
  } finally {
    btn.textContent = '提交评论'
    btn.disabled = false
  }
}

function login() {
  sessionStorage.setItem('pre_login_page', location.href)
  const redirect = encodeURIComponent(location.origin + '/callback.html')
  location.href = 'https://github.com/login/oauth/authorize?client_id=' + CONFIG.clientId + '&redirect_uri=' + redirect + '&scope=public_repo'
}

function logout() {
  state.token = null
  state.user = null
  localStorage.removeItem('gh_token')
  localStorage.removeItem('gh_user')
  renderNav()
}

async function init() {
  if (state.token && !state.user) {
    try {
      const data = await gql('query{viewer{login avatarUrl}}')
      state.user = data.viewer
      localStorage.setItem('gh_user', JSON.stringify(state.user))
    } catch { logout() }
  }
  renderNav()
  await loadPosts()
}

init()
</script>
</body>
</html>
